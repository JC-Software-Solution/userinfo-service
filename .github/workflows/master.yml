name: CI/CD Pipeline

on:
  push:
    branches: ['master']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ---------------------------
      # 📦 Checkout code
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # 🐳 Setup Docker Buildx
      # ---------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------
      # 🔐 LOGIN TO GHCR
      # ---------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------
      # 🔐 LOGIN TO DOCKER HUB
      # ---------------------------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DH_USERNAME }}
          password: ${{ secrets.DH_TOKEN }}

      # ---------------------------
      # 🏷 SET IMAGE VARIABLES (OPTION 2)
      # ---------------------------
      - name: Set image variables
        run: |
          DOCKER_USER=${{ secrets.DH_USERNAME }}
          
          VERSION="$(date +%s).${{ github.run_number }}.${{ github.run_attempt }}"
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          echo "GHCR_IMAGE=ghcr.io/jc-software-solution/userinfo-service:latest" >> $GITHUB_ENV
          echo "GHCR_IMAGE_VERSION=ghcr.io/jc-software-solution/userinfo-service:$VERSION" >> $GITHUB_ENV

          echo "DOCKER_IMAGE=$DOCKER_USER/userinfo-service:latest" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_VERSION=$DOCKER_USER/userinfo-service:$VERSION" >> $GITHUB_ENV

      # ---------------------------
      # 🏗 BUILD + PUSH IMAGE
      # ---------------------------
      - name: Build and Push (GHCR + DockerHub)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.GHCR_IMAGE_VERSION }}
            ${{ env.DOCKER_IMAGE }}
            ${{ env.DOCKER_IMAGE_VERSION }}

      # ---------------------------
      # 📢 SHOW BUILT IMAGES
      # ---------------------------
      - name: Show built images
        run: |
          echo "✅ CI/CD Completed Successfully!"
          echo "----------------------------------"
          echo "GHCR Latest: $GHCR_IMAGE"
          echo "GHCR Version: $GHCR_IMAGE_VERSION"
          echo "DockerHub:   $DOCKER_IMAGE"
          echo "DockerHub Version: $DOCKER_IMAGE_VERSION"
