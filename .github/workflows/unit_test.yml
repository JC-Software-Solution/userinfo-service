name: unit_test

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run tests with coverage
        run: mvn clean test verify -Pcodecoverage

      - name: Print code coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet
          
          LINE=$(xmlstarlet sel -t -v "//counter[@type='LINE']/@covered" target/site/jacoco/jacoco.xml)
          MISSED=$(xmlstarlet sel -t -v "//counter[@type='LINE']/@missed" target/site/jacoco/jacoco.xml)
          
          TOTAL=$((LINE + MISSED))
          COVERAGE=$(awk "BEGIN {printf \"%.2f\", ($LINE/$TOTAL)*100}")
          
          echo "=========================="
          echo "LINE COVERAGE: $COVERAGE%"
          echo "=========================="

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/