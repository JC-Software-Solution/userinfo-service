name: unit_test

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run tests with coverage
        run: mvn clean test verify -Pcodecoverage

      - name: Print code coverage
        run: |
          FILE=target/site/jacoco/jacoco.xml

          LINE_COVERED=$(grep -oP 'type="LINE"[^>]*covered="\K[0-9]+' $FILE | head -n 1 | tr -d '\n')
          LINE_MISSED=$(grep -oP 'type="LINE"[^>]*missed="\K[0-9]+' $FILE | head -n 1 | tr -d '\n')

          echo "Covered: $LINE_COVERED"
          echo "Missed: $LINE_MISSED"

          TOTAL=$((LINE_COVERED + LINE_MISSED))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No coverage data found"
            exit 0
          fi

          COVERAGE=$(awk "BEGIN {printf \"%.2f\", ($LINE_COVERED/$TOTAL)*100}")

          echo "=========================="
          echo "LINE COVERAGE: $COVERAGE%"
          echo "=========================="

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/