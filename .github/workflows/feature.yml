name: Feature Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: ['master']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Compile
    uses: ./.github/workflows/compile.yml

  unit_test:
    name: unit_test
    uses: ./.github/workflows/unit_test.yml