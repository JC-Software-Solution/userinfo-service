spring.application.name=userinfo-service
server.port = 8080


management.endpoint.metrics.enabled=${MANAGEMENT_ENDPOINT_METRICS_ENABLED:true}
management.endpoint.prometheus.enabled=${MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED:true}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
management.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:true}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:true}
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:true}
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
management.metrics.tags.application=${MANAGEMENT_METRICS_TAGS_APPLICATION:zoloz-bl-data-migration}
management.endpoints.jmx.exposure.include=${MANAGEMENT_ENDPOINTS_JMX_EXPOSURE_INCLUDE:info}
management.info.env.enabled=${MANAGEMENT_INFO_ENV_ENABLED:true}
management.info.build.enabled=${MANAGEMENT_INFO_BUILD_ENABLED:true}
management.info.java.enabled=${MANAGEMENT_INFO_JAVA_ENABLED:true}
management.info.git.enabled=${MANAGEMENT_INFO_GIT_ENABLED:true}
management.info.git.mode=${MANAGEMENT_INFO_GIT_MODE:full}
management.metrics.distribution.percentiles-histogram.sqs.listener.migration.timer=true
